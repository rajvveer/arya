name: arvyax
description: ArvyaX – Immersive Ambience & Reflection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Audio
  just_audio: ^0.9.39
  audio_session: ^0.1.21

  # Persistence
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI / Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # Utilities
  path_provider: ^2.1.3
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/audio/
